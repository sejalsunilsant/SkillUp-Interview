<!-- Floating HR Chatbot Widget -->
<div id="hr-chatbot-widget">
    <div id="chat-toggle" title="Chat with HR Assistant">
        <i class="ph-bold ph-chats"></i>
        <span class="notification-badge" style="display:none">1</span>
    </div>
    <div id="chat-window" style="display:none">
        <div class="chat-header">
            <div class="header-info">
                <i class="ph-bold ph-user-circle"></i>
                <div>
                    <h3>HR Assistant</h3>
                    <span class="status">Online</span>
                </div>
            </div>
            <button id="close-chat"><i class="ph-bold ph-x"></i></button>
        </div>
        <div id="chat-messages">
            <div class="message assistant">
                Hello! I'm your SkillUp HR Assistant. I've analyzed your progress data. How can I help you prepare for your next interview today?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button id="send-chat"><i class="ph-bold ph-paper-plane-right"></i></button>
        </div>
    </div>
</div>
